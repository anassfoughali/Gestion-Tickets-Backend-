server:
  port: 8082

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:sap://172.16.102.77:30015
    driver-class-name: com.sap.db.jdbc.Driver
    username: DEVADMIN
    password: D01Admin
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 60000
      connection-timeout: 30000
