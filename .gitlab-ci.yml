# ============================================================
# GitLab CI/CD Pipeline - Finatech Microservices
# ============================================================

stages:
  - build

# Infrastructure Services
build:config-server:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  cache:
    key: config-server
    paths:
      - config-server/.m2/repository
  script:
    - cd config-server
    - chmod +x ./mvnw
    - ./mvnw package -DskipTests -Dmaven.repo.local=.m2/repository

