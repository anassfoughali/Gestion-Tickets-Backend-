build:dashboard-front:
  stage: build
  image: node:20-alpine
  cache:
    key: dashboard-front-$CI_COMMIT_REF_SLUG
    paths:
      - Dashboard-front/dashboard-tickets-frontend/node_modules/
  script:
    - cd Dashboard-front/dashboard-tickets-frontend
    - npm install
    - npm start
  artifacts:
    paths:
      - Dashboard-front/dashboard-tickets-frontend/build/
    expire_in: 1 hour
